overlay:
  layer: overlay                 # overlay | top
  namespace: desktop-hud         # layer-shell namespace
  click_through: true            # zero input region while not editing
  monitor: null                  # null = primary, or monitor name
  edit_mode: false               # startup mode for interactive editing
  edit_hotkey: Ctrl+Alt+M        # toggle edit mode while focused
  show_borders_in_edit_mode: true
  snap_threshold_px: 12
  min_size:
    width: 32
    height: 32
  interaction:
    debug_logging: false
    force_full_redraw_on_move: true
    disable_snap_modifier: Ctrl
    snap_hysteresis_px: 4

layouts:
  directory: layouts             # relative to package dir unless absolute
  default_profile: default       # loaded at startup
  last_used_profile: last-used   # autosave target profile name
  autosave_last_used: true
  editable_trait_items: false

elements:
  - id: sample-gauge
    type: graph
    renderer: gauge
    renderer_config:
      min_value: 0
      max_value: 100
      label: "CPU"
    provider:
      type: command
      command: "grep 'cpu ' /proc/stat | awk '{u=$2+$4; t=$2+$4+$5} END {printf \"%.0f\", u*100/t}'"
      interval_ms: 2000
    position: { x: 50, y: 50 }
    size: { width: 150, height: 150 }
    opacity: 0.8

  - id: sample-image
    type: image
    source: ~/Pictures/logo.png
    position: { x: 250, y: 50 }
    size: { width: 100, height: 100 }
    opacity: 0.5

  - id: sample-video
    type: video
    source: ~/Videos/overlay.webm
    loop: true
    alpha: true
    position: { x: 400, y: 50 }
    size: { width: 200, height: 200 }
    opacity: 1.0

api:
  enabled: true
  port: 7820
